name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Reuse the existing "github-pages" environment so the quiz build-time
    # secrets (NEXT_PUBLIC_QUIZ_SUBMIT_URL / _SECRET) are available here too.
    # Add CLOUDFLARE_API_TOKEN to this same environment.
    environment: github-pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 40c0b283cc23d098d61e0c39fdbd6b38
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_QUIZ_SUBMIT_URL: ${{ secrets.NEXT_PUBLIC_QUIZ_SUBMIT_URL }}
          NEXT_PUBLIC_QUIZ_SUBMIT_SECRET: ${{ secrets.NEXT_PUBLIC_QUIZ_SUBMIT_SECRET }}
        run: npm run export

      - name: Ensure Pages project exists
        run: npx --yes wrangler@4 pages project create lillehammermoske --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy out --project-name=lillehammermoske --branch=main --commit-dirty=true
